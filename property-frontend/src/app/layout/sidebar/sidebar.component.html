<aside class="sidebar" [class.collapsed]="collapsed">

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <span class="material-icons">domain</span>
    </div>
    <div class="brand-text" *ngIf="!collapsed">
      <span class="brand-name">{{ lang === 'ar' ? 'إدارة العقارات' : 'PropManager' }}</span>
      <span class="brand-tagline">{{ lang === 'ar' ? 'نظام متكامل' : 'Integrated System' }}</span>
    </div>
    <button class="collapse-btn" (click)="collapseToggle.emit()">
      <span class="material-icons">{{ collapsed ? 'chevron_right' : 'chevron_left' }}</span>
    </button>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <a
      class="nav-item"
      *ngFor="let item of visibleItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      [matTooltip]="collapsed ? label(item) : ''"
      matTooltipPosition="after"
    >
      <span class="nav-icon material-icons">{{ item.icon }}</span>
      <span class="nav-label" *ngIf="!collapsed">{{ label(item) }}</span>
      <span class="nav-badge" *ngIf="item.badge && item.badge > 0 && !collapsed">{{ item.badge }}</span>
    </a>
  </nav>

  <!-- User Badge -->
  <div class="sidebar-user">
    <img class="user-avatar user-avatar-img" *ngIf="currentUser?.profileImageUrl" [src]="currentUser?.profileImageUrl" alt="profile">
    <div class="user-avatar" *ngIf="!currentUser?.profileImageUrl">{{ currentUser?.initials || 'U' }}</div>
    <div class="user-info" *ngIf="!collapsed">
      <span class="user-name">{{ currentUser?.fullName || '—' }}</span>
      <span class="user-role">{{ roleLabel }}</span>
    </div>
  </div>

  <!-- Logout -->
  <button class="sidebar-logout" (click)="logout()">
    <span class="material-icons">logout</span>
    <span *ngIf="!collapsed">{{ lang === 'ar' ? 'تسجيل الخروج' : 'Logout' }}</span>
  </button>

</aside>
