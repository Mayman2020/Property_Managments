<div class="app-page">
  <app-page-header
    title="تقرير زيارة الصيانة"
    subtitle="سجِّل نتيجة الزيارة والأعمال المنجزة"
    [breadcrumbs]="[{label:'طلباتي', route:'/officer/requests'}, {label:'تقرير الزيارة'}]">
  </app-page-header>

  <div class="form-layout">
    <div class="form-card surface-glow">
      <form [formGroup]="form" (ngSubmit)="submit()">

        <!-- Date -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>تاريخ الزيارة</mat-label>
          <input matInput type="date" formControlName="visitDate">
          <mat-error *ngIf="form.get('visitDate')?.invalid">مطلوب</mat-error>
        </mat-form-field>

        <!-- Outcome -->
        <div class="section-label">نتيجة الزيارة *</div>
        <div class="outcome-grid">
          <button type="button" class="outcome-btn"
            *ngFor="let o of outcomes"
            [class.selected]="form.get('visitOutcome')?.value === o.value"
            (click)="form.patchValue({visitOutcome: o.value})">
            <span class="material-icons">{{ o.icon }}</span>
            <span>{{ o.label }}</span>
          </button>
        </div>

        <!-- Work Done -->
        <mat-form-field appearance="outline" class="full-width" style="margin-top: 16px">
          <mat-label>وصف الأعمال المنجزة</mat-label>
          <textarea matInput formControlName="workDone" rows="4"
            placeholder="اشرح ما تم عمله بالتفصيل..."></textarea>
        </mat-form-field>

        <!-- Officer Notes -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>ملاحظات إضافية</mat-label>
          <textarea matInput formControlName="officerNotes" rows="3"
            placeholder="أي ملاحظات أخرى..."></textarea>
        </mat-form-field>

        <!-- Purchase -->
        <div class="purchase-section">
          <mat-checkbox formControlName="hasPurchase" color="primary">
            تم شراء مواد / قطع غيار
          </mat-checkbox>
          <div class="purchase-details" *ngIf="hasPurchase">
            <mat-form-field appearance="outline">
              <mat-label>المبلغ المدفوع</mat-label>
              <input matInput formControlName="purchaseAmount" type="number" step="0.01">
              <span matSuffix>ر.س</span>
            </mat-form-field>
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>تفاصيل الشراء</mat-label>
              <textarea matInput formControlName="purchaseNotes" rows="2"
                placeholder="ما الذي تم شراؤه؟"></textarea>
            </mat-form-field>
            <div class="receipt-upload">
              <div class="section-label">إيصال الشراء</div>
              <app-upload-zone
                [multiple]="false"
                label="ارفع صورة الإيصال"
                (filesUploaded)="onReceiptUploaded($event)">
              </app-upload-zone>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button mat-stroked-button type="button" routerLink="/officer/requests">إلغاء</button>
          <button mat-flat-button type="submit" [disabled]="form.invalid || submitting">
            <mat-spinner *ngIf="submitting" diameter="18"></mat-spinner>
            <span *ngIf="!submitting">
              <span class="material-icons">save</span>
              حفظ التقرير
            </span>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
